<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standard Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <h1 id="heading">Standard Calculator</h1>
      <div class="row">
        <div class="cal_left_side">
          <div class="result_show">
            <p id="claculation" class="claculation">
              <span id="first_number"></span> <span id="operation"></span>
              <span id="second_number"></span>
            </p>
            <p id="result" class="result">0</p>
          </div>

          <div class="start_calcultor">
            <div class="buttons" id="btn1">
              <button class="operation btnss" id="btns1">%</button>
            </div>
            <div class="buttons" id="btn2">
              <button class="btnss" id="cancleAll">C</button>
            </div>
            <div class="buttons" id="btn3">
              <button class="btnss" id="cancleOne">X</button>
            </div>
            <div class="buttons" id="btn4">
              <button class="operation btnss" id="btns4">/</button>
            </div>
            <div class="buttons" id="btn5">
              <button class="btns btnss" id="btns5">7</button>
            </div>
            <div class="buttons" id="btn6">
              <button class="btns btnss" id="btns6">8</button>
            </div>
            <div class="buttons" id="btn7">
              <button class="btns btnss" id="btns7">9</button>
            </div>
            <div class="buttons" id="btn8">
              <button class="operation btnss" id="btns8">*</button>
            </div>
            <div class="buttons" id="btn9">
              <button class="btns btnss" id="btns9">4</button>
            </div>
            <div class="buttons" id="btn10">
              <button class="btns btnss" id="btns10">5</button>
            </div>
            <div class="buttons" id="btn11">
              <button class="btns btnss" id="btns11">6</button>
            </div>
            <div class="buttons" id="btn12">
              <button class="operation btnss" id="btns12">-</button>
            </div>
            <div class="buttons" id="btn13">
              <button class="btns btnss" id="btns13">1</button>
            </div>
            <div class="buttons" id="btn14">
              <button class="btns btnss" id="btns14">2</button>
            </div>
            <div class="buttons" id="btn15">
              <button class="btns btnss" id="btns15">3</button>
            </div>
            <div class="buttons" id="btn16">
              <button class="operation btnss" id="btns16">+</button>
            </div>
            <div class="buttons" id="btn17">
              <button class="operation btnss" id="btns17">+/-</button>
            </div>
            <div class="buttons" id="btn18">
              <button class="btns btnss" id="btns18">0</button>
            </div>
            <div class="buttons" id="btn19">
              <button class="btns btnss" id="btns19">.</button>
            </div>
            <div class="buttons" id="btn20">
              <button class="btnss" id="equalto">=</button>
            </div>
          </div>
        </div>
     
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
